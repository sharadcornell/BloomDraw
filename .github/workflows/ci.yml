name: CI

# Runs the same checks the project uses locally. No backend, no secrets:
# the app and its tests run fully in mock mode (see CLAUDE.md / docs/08).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Test · Lint · Typecheck · Doctor
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.x' # ≥ 22.13 required (RN 0.85 engine); 24.x is current LTS
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Expo Doctor
        run: npx expo-doctor
